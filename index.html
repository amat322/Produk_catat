<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amat Bajualan - Custom Kategori</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; color: #333; }
        
        /* Navigasi */
        .header { text-align: center; padding: 15px; background: white; border-bottom: 2px solid #3498db; }
        .tab-menu { display: flex; background: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; color: #7f8c8d; font-size: 11px; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #3498db; border-bottom-color: #3498db; background: #f9f9f9; }

        .container { padding: 15px; max-width: 600px; margin: auto; }
        .page { display: none; }
        .page.active { display: block; }

        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h3 { margin-bottom: 12px; font-size: 14px; color: #34495e; border-left: 4px solid #3498db; padding-left: 10px; }

        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 10px; background: white; }
        
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-green { background: #27ae60; color: white; }
        .btn-purple { background: #8e44ad; color: white; }
        .btn-blue { background: #3498db; color: white; }
        .btn-danger { background: #e74c3c; color: white; }

        /* Tabel & List */
        .kat-header { background: #34495e; color: white; padding: 8px 12px; font-size: 13px; font-weight: bold; border-radius: 6px; margin-top: 15px; }
        .table-wrapper { overflow-x: auto; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 350px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
        .stok-kosong { color: white; background: #e74c3c; padding: 2px 5px; border-radius: 4px; font-size: 10px; }
        
        .kat-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 14px; }

        footer { text-align: center; padding: 20px; font-size: 11px; color: #bdc3c7; }
    </style>
</head>
<body>

<div class="header"><h1>📦 Amat Bajualan Pro</h1></div>

<div class="tab-menu">
    <button class="tab-btn active" onclick="openPage('add')">ADD PRODUK</button>
    <button class="tab-btn" onclick="openPage('list')">PRODUK</button>
    <button class="tab-btn" onclick="openPage('excel')">PENGATURAN</button>
</div>

<div class="container">
    
    <div id="page-add" class="page active">
        <div class="card">
            <h3>Input Barang Baru</h3>
            <select id="pKat">
                </select>
            <input type="text" id="pName" placeholder="Nama Barang">
            <input type="number" id="pPrice" placeholder="Harga Jual">
            <input type="number" id="pStock" placeholder="Stok">
            <button class="btn-green" onclick="saveProduct()">➕ Simpan ke Gudang</button>
        </div>
        <div class="card" style="border-top: 4px solid #8e44ad;">
            <h3>Tempel Cepat</h3>
            <textarea id="pasteArea" placeholder="Paste data Nama Harga Stok di sini..."></textarea>
            <button class="btn-purple" onclick="processPaste()">📥 Proses Tempel</button>
        </div>
    </div>

    <div id="page-list" class="page">
        <input type="text" id="searchInp" placeholder="🔎 Cari barang..." onkeyup="renderTable()">
        <div id="kategoriContainer"></div>
        <div class="card" style="margin-top: 20px;">
            <h3>Bagikan Katalog</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom:10px;">
                <button style="background:#128C7E; color:white; font-size:12px;" onclick="shareWA('biz')">📲 WA BUSINESS</button>
                <button style="background:#25D366; color:white; font-size:12px;" onclick="shareWA('reg')">💬 WA BIASA</button>
            </div>
            <button style="background: #e67e22; color:white;" onclick="laporKeBos()">📢 Lapor Barang Habis</button>
        </div>
    </div>

    <div id="page-excel" class="page">
        <div class="card">
            <h3>🛠️ Kelola Nama Kategori</h3>
            <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                <input type="text" id="newKatName" placeholder="Nama Kategori Baru..." style="margin-bottom:0">
                <button class="btn-blue" style="width: 80px;" onclick="addCategory()">Tambah</button>
            </div>
            <div id="katListContainer">
                </div>
        </div>

        <div class="card">
            <h3>💾 Data Excel</h3>
            <button class="btn-blue" onclick="exportExcel()" style="margin-bottom: 10px;">📤 Simpan ke Excel</button>
            <button class="btn-purple" onclick="document.getElementById('fileInp').click()">📥 Ambil dari Excel</button>
            <input type="file" id="fileInp" style="display:none" onchange="importExcel(event)">
            <button class="btn-danger" style="margin-top: 20px;" onclick="clearAllData()">🗑️ HAPUS SEMUA DATA GUDANG</button>
        </div>
    </div>

</div>

<footer><b>Amat Bajualan</b> by Gemini AI</footer>

<script>
    // Data Kategori & Produk
    let categories = JSON.parse(localStorage.getItem('amatCategories')) || ["ROKOK", "MIE", "MINUMAN", "LAINNYA"];
    let products = JSON.parse(localStorage.getItem('amatBajualanData')) || [];

    function openPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        event.currentTarget.classList.add('active');
        
        if(pageId === 'add') updateKatSelect();
        if(pageId === 'list') renderTable();
        if(pageId === 'excel') renderKatList();
    }

    // UPDATE PILIHAN KATEGORI DI FORM
    function updateKatSelect() {
        const select = document.getElementById('pKat');
        select.innerHTML = categories.map(k => `<option value="${k}">${k}</option>`).join('');
    }

    // TAMBAH KATEGORI MANUAL
    function addCategory() {
        const name = document.getElementById('newKatName').value.trim().toUpperCase();
        if (name && !categories.includes(name)) {
            categories.push(name);
            localStorage.setItem('amatCategories', JSON.stringify(categories));
            document.getElementById('newKatName').value = '';
            renderKatList();
            alert("Kategori " + name + " ditambahkan!");
        }
    }

    // HAPUS KATEGORI
    function deleteCategory(index) {
        if(confirm("Hapus kategori ini? (Barang di dalamnya tidak akan terhapus tapi jadi kategori LAINNYA)")) {
            categories.splice(index, 1);
            localStorage.setItem('amatCategories', JSON.stringify(categories));
            renderKatList();
        }
    }

    // TAMPILKAN LIST KATEGORI DI SETTING
    function renderKatList() {
        const container = document.getElementById('katListContainer');
        container.innerHTML = categories.map((k, i) => `
            <div class="kat-item">
                <span>${k}</span>
                <button onclick="deleteCategory(${i})" style="width:auto; background:none; color:red; padding:0">Hapus</button>
            </div>
        `).join('');
    }

    function formatRupiah(angka) { return new Intl.NumberFormat('id-ID').format(angka); }

    function renderTable() {
        const query = document.getElementById('searchInp').value.toLowerCase();
        const container = document.getElementById('kategoriContainer');
        container.innerHTML = '';

        const grouped = products.reduce((acc, p) => {
            const kat = p.category || "LAINNYA";
            if (!acc[kat]) acc[kat] = [];
            acc[kat].push(p);
            return acc;
        }, {});

        for (const kat in grouped) {
            const filtered = grouped[kat].filter(p => p.name.toLowerCase().includes(query));
            if (filtered.length > 0) {
                let html = `<div class="kat-header">${kat}</div>`;
                html += `<div class="table-wrapper card"><table><tbody>`;
                filtered.forEach((p) => {
                    const idx = products.indexOf(p);
                    const status = p.stock <= 0 ? '<span class="stok-kosong">HABIS</span>' : `<b>${p.stock}</b>`;
                    html += `<tr>
                        <td>${p.name}</td>
                        <td>${formatRupiah(p.price)}</td>
                        <td style="text-align:center">${status}</td>
                        <td style="text-align:right"><button style="color:red; background:none; width:auto; padding:0" onclick="deleteProduct(${idx})">✖</button></td>
                    </tr>`;
                });
                html += `</tbody></table></div>`;
                container.innerHTML += html;
            }
        }
        localStorage.setItem('amatBajualanData', JSON.stringify(products));
    }

    function saveProduct() {
        const kat = document.getElementById('pKat').value;
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const stock = document.getElementById('pStock').value;
        if (!name || !price) return alert("Isi Nama & Harga!");
        products.push({ category: kat, name, price: parseInt(price), stock: parseInt(stock) || 0 });
        document.getElementById('pName').value = ''; document.getElementById('pPrice').value = ''; document.getElementById('pStock').value = '';
        alert("Tersimpan!");
    }

    function processPaste() {
        const kat = document.getElementById('pKat').value;
        const text = document.getElementById('pasteArea').value.trim();
        if (!text) return;
        const lines = text.split('\n');
        lines.forEach(line => {
            if (line.toLowerCase().includes("nama")) return;
            const cols = line.split(/\t|  +/); 
            if (cols.length >= 2) {
                products.push({ category: kat, name: cols[0].trim(), price: parseInt(cols[1].replace(/[^0-9]/g, '')) || 0, stock: parseInt(cols[2]) || 0 });
            }
        });
        document.getElementById('pasteArea').value = ''; alert("Data masuk!");
    }

    function shareWA(tipe) {
        let pesan = "*KATALOG AMAT BAJUALAN*\n\n";
        const grouped = products.reduce((acc, p) => {
            const kat = p.category || "LAINNYA";
            if (!acc[kat]) acc[kat] = [];
            acc[kat].push(p);
            return acc;
        }, {});
        for (const kat in grouped) {
            pesan += `*--- ${kat} ---*\n`;
            grouped[kat].forEach(p => { pesan += `• ${p.name} - Rp ${formatRupiah(p.price)}\n`; });
            pesan += "\n";
        }
        window.open((tipe==='biz'?'https://wa.me/':'https://api.whatsapp.com/send') + "?text=" + encodeURIComponent(pesan), '_blank');
    }

    function laporKeBos() {
        const habis = products.filter(p => p.stock <= 0);
        let pesan = "*LAPORAN STOK HABIS*\n";
        habis.forEach((p, i) => { pesan += `${i+1}. *${p.name}* (${p.category})\n`; });
        window.open(`https://wa.me/?text=${encodeURIComponent(pesan)}`, '_blank');
    }

    function deleteProduct(i) { products.splice(i, 1); renderTable(); }
    function clearAllData() { if(confirm("Hapus semua?")) { products = []; renderTable(); } }

    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(products);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Stok");
        XLSX.writeFile(wb, "Amat_Bajualan.xlsx");
    }

    function importExcel(e) {
        const reader = new FileReader();
        reader.onload = (evt) => {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            products = [...products, ...json.map(item => ({
                category: item.category || item["Kategori"] || "LAINNYA",
                name: item.name || item["Nama"] || "",
                price: item.price || 0,
                stock: item.stock || 0
            }))];
            renderTable(); alert("Impor Berhasil!");
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    }

    // Inisialisasi awal
    updateKatSelect();
</script>
</body>
</html>
