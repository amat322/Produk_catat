<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="tabTitle">Gudang Digital</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; color: #333; }
        .header { text-align: center; padding: 15px; background: white; border-bottom: 2px solid #3498db; }
        .header h1 { color: #2c3e50; font-size: 20px; text-transform: uppercase; }
        .tab-menu { display: flex; background: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; color: #7f8c8d; font-size: 11px; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #3498db; border-bottom-color: #3498db; background: #f9f9f9; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h3 { margin-bottom: 12px; font-size: 14px; color: #34495e; border-left: 4px solid #3498db; padding-left: 10px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-green { background: #27ae60; color: white; }
        .btn-blue { background: #3498db; color: white; }
        .kat-header { background: #34495e; color: white; padding: 8px 12px; font-size: 13px; font-weight: bold; border-radius: 6px; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        .stok-kosong { color: white; background: #e74c3c; padding: 2px 5px; border-radius: 4px; font-size: 10px; }
        .btn-edit { background: #f1c40f; color: #333; padding: 6px; font-size: 12px; width: auto; margin-right: 5px; }
        .btn-del { background: #e74c3c; color: white; padding: 6px; font-size: 12px; width: auto; }
        .wa-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        footer { text-align: center; padding: 20px; font-size: 11px; color: #bdc3c7; }
    </style>
</head>
<body>

<div class="header"><h1 id="shopTitleDisplay">MEMUAT...</h1></div>

<div class="tab-menu">
    <button id="tab-add" class="tab-btn active" onclick="openPage('add')">ADD PRODUK</button>
    <button id="tab-list" class="tab-btn" onclick="openPage('list')">PRODUK</button>
    <button id="tab-cfg" class="tab-btn" onclick="openPage('cfg')">PENGATURAN</button>
</div>

<div class="container">
    <div id="page-add" class="page active">
        <div class="card">
            <h3 id="formTitle">Input Barang Baru</h3>
            <select id="pKat"></select>
            <input type="text" id="pName" placeholder="Nama Barang">
            <input type="number" id="pPrice" placeholder="Harga Jual">
            <input type="number" id="pStock" placeholder="Stok">
            <button class="btn-green" id="btnSave" onclick="saveProduct()">➕ Simpan ke Gudang</button>
        </div>
        <div class="card">
            <h3>Tempel dari Excel</h3>
            <textarea id="pasteArea" placeholder="Nama [Tab] Harga [Tab] Stok"></textarea>
            <button style="background: #8e44ad; color:white" onclick="processPaste()">📥 Proses Tempel</button>
        </div>
    </div>

    <div id="page-list" class="page">
        <input type="text" id="searchInp" placeholder="🔎 Cari barang..." onkeyup="renderTable()">
        <div id="kategoriContainer"></div>
        
        <div class="card" style="margin-top:20px">
            <h3>Bagikan Katalog</h3>
            <div class="wa-group">
                <button style="background:#128C7E; color:white" onclick="shareWA('biz')">📲 WA BUSINESS</button>
                <button style="background:#25D366; color:white" onclick="shareWA('reg')">💬 WA BIASA</button>
            </div>
            <button style="background:#e67e22; color:white" onclick="laporKeBos()">📢 Lapor Barang Habis</button>
        </div>
    </div>

    <div id="page-cfg" class="page">
        <div class="card">
            <h3>🏫 Nama Toko / Usaha</h3>
            <input type="text" id="shopNameInput" placeholder="Masukkan Nama Toko Anda...">
            <button class="btn-blue" onclick="updateShopName()">💾 Simpan Nama Toko</button>
        </div>
        <div class="card">
            <h3>🛠️ Kelola Kategori</h3>
            <input type="text" id="newKat" placeholder="Nama Kategori Baru">
            <button class="btn-green" style="background:#3498db" onclick="addCategory()">Tambah Kategori</button>
        </div>
        <div class="card">
            <h3>💾 Backup & Reset</h3>
            <button class="btn-green" style="background:#8e44ad; margin-bottom:10px" onclick="exportExcel()">📤 Simpan ke Excel</button>
            <button class="btn-del" style="width:100%; padding:12px" onclick="clearAllData()">🗑️ HAPUS SEMUA DATA</button>
        </div>
    </div>
</div>

<footer id="footerDisplay">Dibuat oleh Gemini AI</footer>

<script>
    let shopName = localStorage.getItem('amatShopName') || "AMAT BAJUALAN";
    let categories = JSON.parse(localStorage.getItem('amatCategories')) || ["ROKOK", "MIE", "MINUMAN", "LAINNYA"];
    let products = JSON.parse(localStorage.getItem('amatBajualanData')) || [];
    let editIdx = -1;

    function initApp() {
        document.getElementById('shopTitleDisplay').innerText = "📦 " + shopName;
        document.getElementById('tabTitle').innerText = shopName + " - Gudang";
        document.getElementById('shopNameInput').value = shopName;
        document.getElementById('footerDisplay').innerHTML = "<b>" + shopName + "</b> by Gemini AI";
        updateKatSelect();
    }

    function updateShopName() {
        const newName = document.getElementById('shopNameInput').value.trim();
        if (newName) {
            shopName = newName.toUpperCase();
            localStorage.setItem('amatShopName', shopName);
            initApp();
            alert("Nama Toko berhasil diubah jadi: " + shopName);
        }
    }

    function openPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.getElementById('tab-' + pageId).classList.add('active');
        if(pageId === 'list') renderTable();
    }

    function updateKatSelect() {
        document.getElementById('pKat').innerHTML = categories.map(k => `<option value="${k}">${k}</option>`).join('');
    }

    function renderTable() {
        const query = document.getElementById('searchInp').value.toLowerCase();
        const container = document.getElementById('kategoriContainer');
        container.innerHTML = '';
        const grouped = products.reduce((acc, p) => {
            const kat = p.category || "LAINNYA";
            if (!acc[kat]) acc[kat] = [];
            acc[kat].push(p); return acc;
        }, {});

        for (const kat in grouped) {
            const filtered = grouped[kat].filter(p => p.name.toLowerCase().includes(query));
            if (filtered.length > 0) {
                let html = `<div class="kat-header">${kat}</div><div class="card" style="padding:0"><table>`;
                filtered.forEach((p) => {
                    const idx = products.indexOf(p);
                    const status = p.stock <= 0 ? '<span class="stok-kosong">HABIS</span>' : `<b>${p.stock}</b>`;
                    html += `<tr>
                        <td><b>${p.name}</b><br><small>Rp ${new Intl.NumberFormat('id-ID').format(p.price)}</small></td>
                        <td style="text-align:center">${status}</td>
                        <td style="text-align:right">
                            <button class="btn-edit" onclick="editProduct(${idx})">✏️</button>
                            <button class="btn-del" onclick="deleteProduct(${idx})">✖</button>
                        </td>
                    </tr>`;
                });
                html += `</table></div>`;
                container.innerHTML += html;
            }
        }
        localStorage.setItem('amatBajualanData', JSON.stringify(products));
    }

    function saveProduct() {
        const kat = document.getElementById('pKat').value;
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const stock = document.getElementById('pStock').value;
        if (!name || !price) return alert("Isi Nama & Harga!");

        const data = { category: kat, name, price: parseInt(price), stock: parseInt(stock) || 0 };
        if (editIdx === -1) { products.push(data); } 
        else { products[editIdx] = data; editIdx = -1; resetForm(); }

        document.getElementById('pName').value = '';
        document.getElementById('pPrice').value = '';
        document.getElementById('pStock').value = '';
        renderTable();
        openPage('list');
    }

    function resetForm() {
        document.getElementById('formTitle').innerText = "Input Barang Baru";
        document.getElementById('btnSave').innerText = "➕ Simpan ke Gudang";
    }

    function editProduct(idx) {
        editIdx = idx;
        const p = products[idx];
        openPage('add');
        document.getElementById('pKat').value = p.category;
        document.getElementById('pName').value = p.name;
        document.getElementById('pPrice').value = p.price;
        document.getElementById('pStock').value = p.stock;
        document.getElementById('formTitle').innerText = "✏️ Edit Stok Barang";
        document.getElementById('btnSave').innerText = "✅ Perbarui Data";
    }

    function shareWA(tipe) {
        let pesan = `*KATALOG ${shopName}*\n\n`;
        const grouped = products.reduce((acc, p) => {
            const kat = p.category || "LAINNYA";
            if (!acc[kat]) acc[kat] = [];
            acc[kat].push(p); return acc;
        }, {});
        for (const kat in grouped) {
            pesan += `*--- ${kat} ---*\n`;
            grouped[kat].forEach(p => {
                pesan += `• ${p.name} - Rp ${new Intl.NumberFormat('id-ID').format(p.price)} (${p.stock<=0?'❌':'Stok:'+p.stock})\n`;
            });
            pesan += "\n";
        }
        const api = tipe === 'biz' ? 'https://wa.me/' : 'https://api.whatsapp.com/send';
        window.open(api + "?text=" + encodeURIComponent(pesan), '_blank');
    }

    function laporKeBos() {
        const habis = products.filter(p => p.stock <= 0);
        if(habis.length === 0) return alert("Stok Aman!");
        let pesan = `*LAPORAN STOK HABIS - ${shopName}*\n\n`;
        habis.forEach((p, i) => { pesan += `${i+1}. *${p.name}* (${p.category})\n`; });
        window.open("https://wa.me/?text=" + encodeURIComponent(pesan), '_blank');
    }

    function processPaste() {
        const kat = document.getElementById('pKat').value;
        const text = document.getElementById('pasteArea').value.trim();
        if (!text) return;
        text.split('\n').forEach(line => {
            if (line.toLowerCase().includes("nama")) return;
            const cols = line.split(/\t|  +/); 
            if (cols.length >= 2) {
                products.push({ category: kat, name: cols[0].trim(), price: parseInt(cols[1].replace(/[^0-9]/g, '')) || 0, stock: parseInt(cols[2]) || 0 });
            }
        });
        document.getElementById('pasteArea').value = ''; renderTable();
        alert("Berhasil!");
    }

    function addCategory() {
        const n = document.getElementById('newKat').value.trim().toUpperCase();
        if(n && !categories.includes(n)) {
            categories.push(n); localStorage.setItem('amatCategories', JSON.stringify(categories));
            document.getElementById('newKat').value = ''; updateKatSelect(); alert("Kategori ditambahkan!");
        }
    }
    
    function deleteProduct(i) { if(confirm("Hapus?")) { products.splice(i, 1); renderTable(); } }
    function clearAllData() { if(confirm("Hapus SEMUA data?")) { products = []; renderTable(); } }
    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(products);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Stok");
        XLSX.writeFile(wb, shopName + "_Stok.xlsx");
    }

    // Jalankan awal
    initApp();
</script>
</body>
</html>
