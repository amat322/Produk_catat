<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amat Bajualan - Edit Stok</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; color: #333; }
        .header { text-align: center; padding: 15px; background: white; border-bottom: 2px solid #3498db; }
        .tab-menu { display: flex; background: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; color: #7f8c8d; font-size: 11px; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #3498db; border-bottom-color: #3498db; background: #f9f9f9; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-green { background: #27ae60; color: white; }
        .kat-header { background: #34495e; color: white; padding: 8px 12px; font-size: 13px; font-weight: bold; border-radius: 6px; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        .stok-kosong { color: white; background: #e74c3c; padding: 2px 5px; border-radius: 4px; font-size: 10px; }
        .btn-edit { background: #f1c40f; color: #333; padding: 5px 8px; font-size: 12px; width: auto; margin-right: 5px; }
        .btn-del { background: #e74c3c; color: white; padding: 5px 8px; font-size: 12px; width: auto; }
        footer { text-align: center; padding: 20px; font-size: 11px; color: #bdc3c7; }
    </style>
</head>
<body>

<div class="header"><h1>📦 Amat Bajualan Pro</h1></div>

<div class="tab-menu">
    <button id="btn-tab-add" class="tab-btn active" onclick="openPage('add')">ADD PRODUK</button>
    <button id="btn-tab-list" class="tab-btn" onclick="openPage('list')">PRODUK</button>
    <button id="btn-tab-excel" class="tab-btn" onclick="openPage('excel')">PENGATURAN</button>
</div>

<div class="container">
    <div id="page-add" class="page active">
        <div class="card">
            <h3 id="formTitle">Input Barang Baru</h3>
            <select id="pKat"></select>
            <input type="text" id="pName" placeholder="Nama Barang">
            <input type="number" id="pPrice" placeholder="Harga Jual">
            <input type="number" id="pStock" placeholder="Stok">
            <button class="btn-green" id="btnSave" onclick="saveProduct()">➕ Simpan ke Gudang</button>
        </div>
    </div>

    <div id="page-list" class="page">
        <input type="text" id="searchInp" placeholder="🔎 Cari barang..." onkeyup="renderTable()">
        <div id="kategoriContainer"></div>
    </div>

    <div id="page-excel" class="page">
        <div class="card">
            <h3>🛠️ Kategori & Data</h3>
            <input type="text" id="newKatName" placeholder="Tambah Kategori Baru...">
            <button class="btn-green" style="background:#3498db; margin-bottom:20px" onclick="addCategory()">Tambah Kategori</button>
            <button class="btn-del" style="width:100%; padding:12px" onclick="clearAllData()">🗑️ HAPUS SEMUA DATA</button>
        </div>
    </div>
</div>

<footer><b>Amat Bajualan</b> by Gemini AI</footer>

<script>
    let categories = JSON.parse(localStorage.getItem('amatCategories')) || ["ROKOK", "MIE", "MINUMAN", "LAINNYA"];
    let products = JSON.parse(localStorage.getItem('amatBajualanData')) || [];
    let editIdx = -1; // Menandai barang yang sedang diedit

    function openPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.getElementById('btn-tab-' + pageId).classList.add('active');
        if(pageId === 'add') updateKatSelect();
        if(pageId === 'list') renderTable();
    }

    function updateKatSelect() {
        document.getElementById('pKat').innerHTML = categories.map(k => `<option value="${k}">${k}</option>`).join('');
    }

    function renderTable() {
        const query = document.getElementById('searchInp').value.toLowerCase();
        const container = document.getElementById('kategoriContainer');
        container.innerHTML = '';
        const grouped = products.reduce((acc, p) => {
            const kat = p.category || "LAINNYA";
            if (!acc[kat]) acc[kat] = [];
            acc[kat].push(p);
            return acc;
        }, {});

        for (const kat in grouped) {
            const filtered = grouped[kat].filter(p => p.name.toLowerCase().includes(query));
            if (filtered.length > 0) {
                let html = `<div class="kat-header">${kat}</div><div class="card" style="padding:0"><table>`;
                filtered.forEach((p) => {
                    const idx = products.indexOf(p);
                    const status = p.stock <= 0 ? '<span class="stok-kosong">HABIS</span>' : `<b>${p.stock}</b>`;
                    html += `<tr>
                        <td>${p.name}<br><small>Rp ${new Intl.NumberFormat('id-ID').format(p.price)}</small></td>
                        <td style="text-align:center">${status}</td>
                        <td style="text-align:right">
                            <button class="btn-edit" onclick="editProduct(${idx})">✏️</button>
                            <button class="btn-del" onclick="deleteProduct(${idx})">✖</button>
                        </td>
                    </tr>`;
                });
                html += `</table></div>`;
                container.innerHTML += html;
            }
        }
        localStorage.setItem('amatBajualanData', JSON.stringify(products));
    }

    function saveProduct() {
        const kat = document.getElementById('pKat').value;
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const stock = document.getElementById('pStock').value;
        if (!name || !price) return alert("Isi Nama & Harga!");

        const data = { category: kat, name, price: parseInt(price), stock: parseInt(stock) || 0 };

        if (editIdx === -1) {
            products.push(data); // Tambah Baru
        } else {
            products[editIdx] = data; // Simpan Hasil Edit
            editIdx = -1;
            document.getElementById('formTitle').innerText = "Input Barang Baru";
            document.getElementById('btnSave').innerText = "➕ Simpan ke Gudang";
        }

        document.getElementById('pName').value = '';
        document.getElementById('pPrice').value = '';
        document.getElementById('pStock').value = '';
        alert("Berhasil disimpan!");
        openPage('list');
    }

    function editProduct(index) {
        editIdx = index;
        const p = products[index];
        openPage('add'); // Pindah ke halaman input
        
        // Isi form dengan data yang mau diedit
        document.getElementById('pKat').value = p.category;
        document.getElementById('pName').value = p.name;
        document.getElementById('pPrice').value = p.price;
        document.getElementById('pStock').value = p.stock;
        
        // Ubah tampilan tombol
        document.getElementById('formTitle').innerText = "✏️ Edit Stok Barang";
        document.getElementById('btnSave').innerText = "✅ Perbarui Data";
    }

    function deleteProduct(i) { if(confirm("Hapus?")) { products.splice(i, 1); renderTable(); } }
    function addCategory() {
        const name = document.getElementById('newKatName').value.trim().toUpperCase();
        if (name && !categories.includes(name)) {
            categories.push(name);
            localStorage.setItem('amatCategories', JSON.stringify(categories));
            document.getElementById('newKatName').value = '';
            alert("Kategori Tambah!");
        }
    }
    function clearAllData() { if(confirm("Hapus semua?")) { products = []; renderTable(); } }

    updateKatSelect();
</script>
</body>
</html>
