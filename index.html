<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amat Bajualan - Manajemen Stok</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 10px; overflow-x: hidden; }
        .container { max-width: 100%; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #2c3e50; font-size: 22px; margin-top: 5px; }
        .form-group { display: flex; flex-direction: column; gap: 10px; background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { padding: 12px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; }
        .btn-add { background-color: #27ae60; color: white; width: 100%; }
        .btn-wa { background-color: #25D366; color: white; width: 100%; margin-top: 20px; }
        .flex-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .btn-export { background-color: #3498db; color: white; }
        .btn-import { background-color: #8e44ad; color: white; }
        .search-box { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #3498db; border-radius: 8px; }
        .table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
        th { background-color: #3498db; color: white; }
        .stok-kosong { color: white; background: #e74c3c; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
        .action-btns { display: flex; gap: 5px; }
        .btn-edit { background-color: #f39c12; color: white; padding: 5px; }
        .btn-delete { background-color: #e74c3c; color: white; padding: 5px; }
        footer { text-align: center; margin-top: 20px; font-size: 11px; color: #bdc3c7; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <svg width="50" height="50" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" fill="#3498db"/><text x="50" y="65" font-family="Arial" font-size="30" font-weight="bold" fill="white" text-anchor="middle">AB</text>
        </svg>
        <h1>Amat Bajualan</h1>
        <p>Manajemen Stok & Katalog WA</p>
    </div>
    <div class="form-group">
        <input type="text" id="pName" placeholder="Nama Produk">
        <input type="number" id="pPrice" placeholder="Harga (Rp)">
        <input type="number" id="pStock" placeholder="Stok">
        <button class="btn-add" onclick="saveProduct()">➕ Simpan Produk</button>
    </div>
    <input type="text" id="searchInp" class="search-box" placeholder="🔎 Cari produk..." onkeyup="renderTable()">
    <div class="flex-actions">
        <button class="btn-export" onclick="exportExcel()">📤 Excel</button>
        <button class="btn-import" onclick="document.getElementById('fileInp').click()">📥 Impor</button>
        <input type="file" id="fileInp" style="display:none" accept=".xlsx" onchange="importExcel(event)">
    </div>
    <div class="table-wrapper">
        <table>
            <thead><tr><th>Produk</th><th>Harga</th><th>Stok</th><th>Aksi</th></tr></thead>
            <tbody id="productBody"></tbody>
        </table>
    </div>
    <button class="btn-wa" onclick="shareToWhatsApp()">📲 Share Katalog ke WhatsApp</button>
    <footer><b>Amat Bajualan</b> by Gemini AI</footer>
</div>
<script>
    let products = JSON.parse(localStorage.getItem('amatBajualanData')) || [];
    let editIdx = -1;
    function renderTable() {
        const query = document.getElementById('searchInp').value.toLowerCase();
        const tbody = document.getElementById('productBody');
        tbody.innerHTML = '';
        products.forEach((p, i) => {
            if (p.name.toLowerCase().includes(query)) {
                const status = p.stock <= 0 ? '<span class="stok-kosong">HABIS</span>' : `<b>${p.stock}</b>`;
                tbody.innerHTML += `<tr><td>${p.name}</td><td>${Number(p.price).toLocaleString('id-ID')}</td><td>${status}</td><td><div class="action-btns"><button class="btn-edit" onclick="editProduct(${i})">✏️</button><button class="btn-delete" onclick="deleteProduct(${i})">🗑️</button></div></td></tr>`;
            }
        });
        localStorage.setItem('amatBajualanData', JSON.stringify(products));
    }
    function saveProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const stock = document.getElementById('pStock').value;
        if (!name || !price || stock === "") return alert("Isi semua data!");
        if (editIdx === -1) { products.push({ name, price, stock: parseInt(stock) }); } 
        else { products[editIdx] = { name, price, stock: parseInt(stock) }; editIdx = -1; }
        document.getElementById('pName').value = ''; document.getElementById('pPrice').value = ''; document.getElementById('pStock').value = ''; renderTable();
    }
    function deleteProduct(i) { if(confirm("Hapus?")) { products.splice(i, 1); renderTable(); } }
    function editProduct(i) {
        document.getElementById('pName').value = products[i].name;
        document.getElementById('pPrice').value = products[i].price;
        document.getElementById('pStock').value = products[i].stock;
        editIdx = i; window.scrollTo(0,0);
    }
    function shareToWhatsApp() {
        if (products.length === 0) return alert("Kosong!");
        let pesan = "*KATALOG AMAT BAJUALAN*\n\n";
        products.forEach((p, i) => {
            const s = p.stock <= 0 ? "❌ HABIS" : `✅ Stok: ${p.stock}`;
            pesan += `*${p.name}*\nHarga: Rp ${Number(p.price).toLocaleString('id-ID')}\n${s}\n\n`;
        });
        window.open(`https://wa.me/?text=${encodeURIComponent(pesan)}`, '_blank');
    }
    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(products);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Stok");
        XLSX.writeFile(wb, "Amat_Bajualan.xlsx");
    }
    function importExcel(e) {
        const reader = new FileReader();
        reader.onload = (evt) => {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            products = [...products, ...json.map(item => ({
                name: item.name || item["Nama Produk"] || "",
                price: item.price || item["Harga"] || 0,
                stock: item.stock || item["Stok"] || 0
            }))];
            renderTable();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    }
    renderTable();
</script>
</body>
</html>
