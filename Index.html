<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amat Bajualan - Manajemen Stok</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
        
        /* Gaya Area Header & Logo */
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #f0f2f5; padding-bottom: 20px; }
        .logo-container { margin-bottom: 15px; }
        .header h1 { color: #2c3e50; margin: 0; font-size: 28px; font-weight: 800; }
        .header p { color: #7f8c8d; margin: 5px 0 0; font-style: italic; font-size: 14px; }
        
        /* Gaya Form Input */
        .form-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; background: #f8f9fa; padding: 20px; border-radius: 12px; border: 1px solid #eee; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; flex: 1; min-width: 150px; transition: 0.3s; }
        input:focus { border-color: #3498db; outline: none; box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15); }
        
        /* Gaya Tombol-Tombol */
        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; font-size: 14px; }
        button:hover { opacity: 0.85; transform: translateY(-1px); }
        button:active { transform: translateY(1px); }
        
        .btn-add { background-color: #27ae60; color: white; flex-grow: 1; }
        .btn-wa { background-color: #25D366; color: white; width: 100%; margin-top: 25px; font-size: 16px; padding: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-export { background-color: #3498db; color: white; }
        .btn-import { background-color: #8e44ad; color: white; }
        .btn-edit { background-color: #f39c12; color: white; padding: 6px 12px; font-size: 12px; }
        .btn-delete { background-color: #e74c3c; color: white; padding: 6px 12px; font-size: 12px; }

        /* Gaya Area Pencarian & Aksi Excel */
        .search-box { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #3498db; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .flex-actions { display: flex; gap: 10px; margin-bottom: 15px; justify-content: flex-end; }
        
        /* Gaya Tabel */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 500px; }
        th, td { border-bottom: 1px solid #eee; padding: 15px; text-align: left; }
        th { background-color: #3498db; color: white; font-weight: 600; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; }
        tr:hover { background-color: #fbfcfc; }
        
        /* Gaya Status Stok */
        .stok-kosong { color: #e74c3c; font-weight: bold; background: #fadbd8; padding: 5px 10px; border-radius: 20px; font-size: 12px; }
        .stok-ada { color: #27ae60; font-weight: bold; }
        
        /* Gaya Footer */
        footer { text-align: center; margin-top: 40px; font-size: 12px; color: #bdc3c7; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-container">
            <svg width="80" height="80" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="53" cy="53" r="45" fill="rgba(0,0,0,0.05)"/>
                <circle cx="50" cy="50" r="45" fill="#3498db"/>
                <path d="M35 40 C 35 25, 65 25, 65 40" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
                <rect x="30" y="40" width="40" height="35" rx="3" fill="white"/>
                <text x="50" y="63" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#3498db" text-anchor="middle">AB</text>
                <circle cx="75" cy="30" r="8" fill="#27ae60" stroke="white" stroke-width="2"/>
            </svg>
        </div>
        <h1>Amat Bajualan</h1>
        <p>Solusi Pintar Manajemen Stok Produk Amat</p>
    </div>

    <div class="form-group">
        <input type="text" id="pName" placeholder="Nama Produk (misal: Kaos Polos)">
        <input type="number" id="pPrice" placeholder="Harga (Rp)">
        <input type="number" id="pStock" placeholder="Jumlah Stok">
        <button class="btn-add" onclick="saveProduct()">➕ Simpan Produk</button>
    </div>

    <input type="text" id="searchInp" class="search-box" placeholder="🔎 Cari produk di Amat Bajualan..." onkeyup="renderTable()">

    <div class="flex-actions">
        <button class="btn-export" onclick="exportExcel()">📤 Ekspor Excel</button>
        <button class="btn-import" onclick="document.getElementById('fileInp').click()">📥 Impor Excel</button>
        <input type="file" id="fileInp" style="display:none" accept=".xlsx" onchange="importExcel(event)">
    </div>

    <div class="table-container">
        <table id="productTable">
            <thead>
                <tr>
                    <th>Produk</th>
                    <th>Harga</th>
                    <th>Status Stok</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="productBody"></tbody>
        </table>
    </div>

    <button class="btn-wa" onclick="shareToWhatsApp()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>
        Share Katalog via WhatsApp
    </button>

    <footer>
        Dibuat oleh <b>Amat Bajualan</b> by Gemini AI
    </footer>
</div>

<script>
    // Logika JavaScript tetap sama seperti sebelumnya
    let products = JSON.parse(localStorage.getItem('amatBajualanData')) || [];
    let editIdx = -1;

    function renderTable() {
        const query = document.getElementById('searchInp').value.toLowerCase();
        const tbody = document.getElementById('productBody');
        tbody.innerHTML = '';

        products.forEach((p, i) => {
            if (p.name.toLowerCase().includes(query)) {
                const isKosong = p.stock <= 0;
                const stokDisplay = isKosong ? '<span class="stok-kosong">HABIS</span>' : `<span class="stok-ada">${p.stock} pcs</span>`;
                
                tbody.innerHTML += `
                    <tr>
                        <td><b>${p.name}</b></td>
                        <td>Rp ${Number(p.price).toLocaleString('id-ID')}</td>
                        <td>${stokDisplay}</td>
                        <td>
                            <button class="btn-edit" onclick="editProduct(${i})">Edit</button>
                            <button class="btn-delete" onclick="deleteProduct(${i})">Hapus</button>
                        </td>
                    </tr>
                `;
            }
        });
        localStorage.setItem('amatBajualanData', JSON.stringify(products));
    }

    function saveProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const stock = document.getElementById('pStock').value;

        if (!name || !price || stock === "") return alert("Lengkapi data produk Amat!");

        if (editIdx === -1) {
            products.push({ name, price, stock: parseInt(stock) });
        } else {
            products[editIdx] = { name, price, stock: parseInt(stock) };
            editIdx = -1;
        }

        resetForm();
        renderTable();
    }

    function resetForm() {
        document.getElementById('pName').value = '';
        document.getElementById('pPrice').value = '';
        document.getElementById('pStock').value = '';
    }

    function deleteProduct(i) {
        if(confirm("Hapus produk ini dari daftar Amat Bajualan?")) {
            products.splice(i, 1);
            renderTable();
        }
    }

    function editProduct(i) {
        document.getElementById('pName').value = products[i].name;
        document.getElementById('pPrice').value = products[i].price;
        document.getElementById('pStock').value = products[i].stock;
        editIdx = i;
    }

    function shareToWhatsApp() {
        if (products.length === 0) return alert("Belum ada produk untuk dibagikan!");

        let pesan = "*KATALOG PRODUK - AMAT BAJUALAN*\n";
        pesan += "--------------------------------------\n";
        
        products.forEach((p, i) => {
            const status = p.stock <= 0 ? "❌ HABIS" : `✅ Ready: ${p.stock}`;
            pesan += `${i+1}. *${p.name}*\n   Harga: Rp ${Number(p.price).toLocaleString('id-ID')}\n   Stok: ${status}\n\n`;
        });

        pesan += "--------------------------------------\n_Order sekarang via Amat Bajualan_";
        
        window.open(`https://wa.me/?text=${encodeURIComponent(pesan)}`, '_blank');
    }

    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(products);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Stok Amat Bajualan");
        XLSX.writeFile(wb, "Data_Amat_Bajualan.xlsx");
    }

    function importExcel(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (evt) => {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            
            const mapping = json.map(item => ({
                name: item.name || item["Nama Produk"] || "",
                price: item.price || item["Harga"] || 0,
                stock: item.stock || item["Stok"] || 0
            }));

            products = [...products, ...mapping];
            renderTable();
        };
        reader.readAsArrayBuffer(file);
    }

    renderTable();
</script>

</body>
</html>
